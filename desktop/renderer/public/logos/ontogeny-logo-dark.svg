<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Hexagonal cube lattice -->
  <g stroke="#171717" stroke-width="1.2" stroke-linecap="round">
    <!-- Outer hexagon -->
    <line x1="100" y1="18" x2="165" y2="55"/>
    <line x1="165" y1="55" x2="165" y2="125"/>
    <line x1="165" y1="125" x2="100" y2="162"/>
    <line x1="100" y1="162" x2="35" y2="125"/>
    <line x1="35" y1="125" x2="35" y2="55"/>
    <line x1="35" y1="55" x2="100" y2="18"/>
    <!-- Inner verticals -->
    <line x1="100" y1="18" x2="100" y2="72"/>
    <line x1="165" y1="55" x2="118" y2="82"/>
    <line x1="165" y1="125" x2="118" y2="98"/>
    <line x1="100" y1="162" x2="100" y2="108"/>
    <line x1="35" y1="125" x2="82" y2="98"/>
    <line x1="35" y1="55" x2="82" y2="82"/>
    <!-- Cross connections -->
    <line x1="82" y1="82" x2="118" y2="82"/>
    <line x1="82" y1="98" x2="118" y2="98"/>
    <line x1="100" y1="72" x2="118" y2="82"/>
    <line x1="100" y1="72" x2="82" y2="82"/>
    <line x1="100" y1="108" x2="118" y2="98"/>
    <line x1="100" y1="108" x2="82" y2="98"/>
    <!-- Center vertical -->
    <line x1="100" y1="72" x2="100" y2="108"/>
  </g>
  <!-- Nodes at vertices -->
  <g fill="#171717">
    <circle cx="100" cy="18" r="3.5"/>
    <circle cx="165" cy="55" r="3.5"/>
    <circle cx="165" cy="125" r="3.5"/>
    <circle cx="100" cy="162" r="3.5"/>
    <circle cx="35" cy="125" r="3.5"/>
    <circle cx="35" cy="55" r="3.5"/>
    <circle cx="100" cy="72" r="2.8"/>
    <circle cx="118" cy="82" r="2.8"/>
    <circle cx="118" cy="98" r="2.8"/>
    <circle cx="100" cy="108" r="2.8"/>
    <circle cx="82" cy="98" r="2.8"/>
    <circle cx="82" cy="82" r="2.8"/>
    <circle cx="100" cy="90" r="2.2"/>
  </g>
  <!-- Infinity / Möbius strip -->
  <g stroke="#171717" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 62 90 C 62 68, 80 58, 100 72 C 120 82, 138 72, 138 90 C 138 112, 120 122, 100 108 C 80 98, 62 112, 62 90 Z"/>
  </g>
  <!-- Möbius twist lines -->
  <g stroke="#171717" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 70 82 C 80 74, 92 74, 100 80"/>
    <path d="M 130 98 C 120 106, 108 106, 100 100"/>
  </g>
</svg>
